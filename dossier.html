<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: transparent; overflow: visible; }
        .widget-container { position: fixed; bottom: 20px; right: 20px; z-index: 999999; }
        
        .msg-box {
            width: 320px; background: white; border-radius: 15px; box-shadow: 0 12px 45px rgba(0,0,0,0.25);
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
            position: absolute; bottom: 70px; right: 0; border: 1px solid #eee; overflow: hidden;
        }
        .active .msg-box { opacity: 1; visibility: visible; }
        .msg-header { padding: 14px 18px; background: #f8f9fa; border-bottom: 2px solid #7a0700; display: flex; align-items: center; justify-content: space-between; }
        .msg-body { padding: 20px; font-size: 15px; color: #333; line-height: 1.6; }
        
        .pill-fab { display: flex; align-items: center; background: #ffffff; padding: 6px 20px 6px 6px; border-radius: 40px; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.15); border: 1px solid #eee; }
        .pill-fab img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #7a0700; }

        /* MÓVIL: Fuerza el centrado y que no dependa del tamaño del iframe */
        @media (max-width: 480px) {
            .active .msg-box { 
                position: fixed !important; 
                bottom: 20% !important; 
                right: 5% !important; 
                left: 5% !important; 
                width: 90vw !important; 
            }
        }
    </style>
</head>
<body>
<div class="widget-container" id="widget">
    <div class="msg-box">
        <div class="msg-header">
            <div style="display: flex; align-items: center;">
                <span style="width:9px; height:9px; background:#28a745; border-radius:50%;"></span>
                <strong style="margin-left:10px;">Prof. Inmer Camacaro</strong>
            </div>
            <span style="cursor:pointer; font-size:24px; color:#7a0700;" onclick="toggleWidget()">×</span>
        </div>
        <div class="msg-body">¡Hola! Te recuerdo que el cumplimiento del <strong>Dossier de Rol Asignado</strong> es un requisito <strong>indispensable</strong>. ¡Mucho éxito!</div>
    </div>
    <div class="pill-fab" onclick="toggleWidget()">
        <img src="https://i.postimg.cc/Jz6X1P57/ezgif-4ca1de2224c7e3.webp">
        <div style="margin-left:12px;">
            <div style="font-weight:700;">Prof. Inmer C.</div>
            <div style="color:#7a0700; font-size:10px; font-weight:800;">¡ESTO TE INTERESA!</div>
        </div>
    </div>
</div>
<script>
    function toggleWidget() { document.getElementById('widget').classList.toggle('active'); }
</script>
</body>
</html>
