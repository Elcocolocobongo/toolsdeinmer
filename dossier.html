<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; background: transparent; overflow: visible; height: 100%; }
        
        /* El contenedor ahora ocupa toda la pantalla del usuario, sin importar el iframe */
        #main-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; /* Deja pasar los clics del Moodle */
            z-index: 999999;
        }

        .widget-inner {
            position: absolute;
            bottom: 20px; right: 20px;
            pointer-events: auto; /* Solo el widget recibe clics */
        }

        .msg-box {
            width: 320px; background: white; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none; /* Oculto por defecto */
            position: absolute; bottom: 80px; right: 0;
            border: 1px solid #eee; overflow: hidden;
        }

        /* En móvil forzamos el centrado total de la caja */
        @media (max-width: 480px) {
            .msg-box { width: 90vw !important; right: 5vw !important; bottom: 100px; }
        }

        .pill-fab { display: flex; align-items: center; background: #fff; padding: 6px 20px 6px 6px; border-radius: 40px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div class="widget-inner">
        <div id="msg-box" class="msg-box">
            <div style="padding:15px; border-bottom:2px solid #7a0700; display:flex; justify-content:space-between;">
                <strong>Prof. Inmer Camacaro</strong>
                <span onclick="toggle()" style="cursor:pointer; font-weight:bold; color:#7a0700;">×</span>
            </div>
            <div style="padding:20px;">¡Hola! El cumplimiento del <strong>Dossier</strong> es requisito <strong>indispensable</strong>.</div>
        </div>

        <div class="pill-fab" onclick="toggle()">
            <img src="https://i.postimg.cc/Jz6X1P57/ezgif-4ca1de2224c7e3.webp" style="width:40px; height:40px; border-radius:50%; border: 2px solid #7a0700;">
            <div style="margin-left:10px;"><strong>Prof. Inmer C.</strong><br><small style="color:#7a0700; font-weight:bold;">¡ESTO TE INTERESA!</small></div>
        </div>
    </div>
</div>

<script>
    function toggle() {
        var b = document.getElementById('msg-box');
        b.style.display = (b.style.display === 'block') ? 'none' : 'block';
    }
</script>
</body>
</html>
