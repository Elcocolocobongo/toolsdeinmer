<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: visible; font-family: sans-serif; }
        .container { position: fixed; bottom: 20px; right: 20px; z-index: 999999; }
        
        .box { transition: all 0.3s ease; opacity: 1; transform: scale(1); }
        .hidden { opacity: 0; transform: scale(0); pointer-events: none; position: absolute; }
        
        .fab { display: flex; align-items: center; background: white; padding: 10px 20px; border-radius: 40px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 1px solid #eee; }
        .chat-bubble { width: 300px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="fab" class="box fab" onclick="showChat()">
        <img src="https://i.postimg.cc/Jz6X1P57/ezgif-4ca1de2224c7e3.webp" style="width:40px; border-radius:50%;">
        <div style="margin-left:10px;"><b>Inmer C.</b><br><small style="color:#7a0700;">¡ESTO TE INTERESA!</small></div>
    </div>

    <div id="bubble" class="box chat-bubble hidden">
        <div style="padding:15px; border-bottom:2px solid #7a0700;"><b>Inmer Camacaro</b> <span style="float:right; cursor:pointer;" onclick="hideChat()">×</span></div>
        <div style="padding:15px;">¡Hola! El cumplimiento del <b>Dossier</b> es indispensable.</div>
    </div>
</div>

<script>
    function showChat() {
        document.getElementById('fab').classList.add('hidden');
        document.getElementById('bubble').classList.remove('hidden');
    }
    function hideChat() {
        document.getElementById('bubble').classList.add('hidden');
        document.getElementById('fab').classList.remove('hidden');
    }
</script>

</body>
</html>
