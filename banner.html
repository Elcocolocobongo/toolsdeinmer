<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; display: flex; justify-content: center; background: transparent; overflow: hidden; }

        .header-container {
            width: 508px;
            height: 283px;
            position: relative;
            overflow: hidden;
            background: #ffffff;
        }

        .banner-img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* TELÓN CON REVEAL DIFUMINADO - AJUSTADO A 2s */
        .curtain {
            position: absolute;
            top: -110%; 
            left: -110%;
            width: 350%; 
            height: 350%;
            background: #ffffff;
            
            transform: rotate(-25deg);
            /* El difuminado (fade) del borde */
            box-shadow: 0 0 80px 40px #ffffff; 
            
            animation: slideDiagonal 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            z-index: 2;
        }

        @keyframes slideDiagonal {
            0% {
                transform: translate(-5%, -5%) rotate(-25deg);
            }
            100% {
                transform: translate(110%, 110%) rotate(-25deg);
            }
        }

        /* EL DESTELLO FINAL - SINCRONIZADO A LOS 2s */
        .header-container::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 35%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-25deg);
            /* Entra exacto al segundo 2.0 cuando el telón despeja */
            animation: shine 1.2s ease-out 2s forwards;
            z-index: 3;
        }

        @keyframes shine {
            100% { left: 200%; }
        }
    </style>
</head>
<body>

<div class="header-container">
    <img src="https://i.postimg.cc/3RB3mzDT/d47e4141-e04b-4c9e-a77b-2c2fd117de53-ezgif-com-jpg-to-webp-converter.webp" class="banner-img">
    <div class="curtain"></div>
</div>

</body>
</html>
