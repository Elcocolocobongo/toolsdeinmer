<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: visible; font-family: 'Segoe UI', sans-serif; }
        
        /* Contenedor que mantiene el espacio */
        .widget-wrapper { position: fixed; bottom: 20px; right: 20px; z-index: 999999; }

        .msg-box {
            width: 320px; background: white; border-radius: 15px;
            box-shadow: 0 12px 45px rgba(0,0,0,0.25);
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
            position: absolute; bottom: 60px; right: 0;
            border: 1px solid #7a0700; overflow: hidden;
        }
        .active .msg-box { opacity: 1; visibility: visible; }
        
        .pill-fab { display: flex; align-items: center; background: white; padding: 6px 20px 6px 6px; border-radius: 40px; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.15); border: 1px solid #7a0700; }
        
        @media (max-width: 480px) {
            .active .msg-box { position: fixed !important; top: 20% !important; left: 5%; right: 5%; width: 90vw !important; bottom: auto !important; }
        }
    </style>
</head>
<body>
    <div class="widget-wrapper" id="widget">
        <div class="msg-box">
            <div style="padding:15px; border-bottom:2px solid #7a0700; display:flex; justify-content:space-between; align-items:center;">
                <strong>Prof. Inmer Camacaro</strong>
                <span onclick="toggle()" style="cursor:pointer; font-size:20px;">×</span>
            </div>
            <div style="padding:20px; font-size:15px;">¡Hola! El cumplimiento del <strong>Dossier de Rol Asignado</strong> es requisito <strong>indispensable</strong>. ¡Mucho éxito!</div>
        </div>
        <div class="pill-fab" onclick="toggle()">
            <img src="https://i.postimg.cc/Jz6X1P57/ezgif-4ca1de2224c7e3.webp" style="width:40px; height:40px; border-radius:50%;">
            <div style="margin-left:10px;"><strong>Prof. Inmer C.</strong></div>
        </div>
    </div>
    <script>function toggle(){document.getElementById('widget').classList.toggle('active');}</script>
</body>
</html>
