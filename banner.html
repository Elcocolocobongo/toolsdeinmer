<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Reset básico para evitar espacios extra */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            background: transparent; 
            overflow: hidden; 
        }

        .header-container {
            /* Dimensiones estrictas del SAIA */
            width: 508px;
            height: 283px;
            position: relative;
            overflow: hidden;
            background: #ffffff;
        }

        .banner-img {
            /* Fuerza a la imagen a ocupar solo el espacio del contenedor */
            width: 508px;
            height: 283px;
            display: block;
            object-fit: cover; /* Recorta el exceso sin deformar */
            object-position: center;
        }

        /* TELÓN CON REVEAL DIFUMINADO - 2 SEGUNDOS */
        .curtain {
            position: absolute;
            top: -110%; 
            left: -110%;
            width: 350%; 
            height: 350%;
            background: #ffffff;
            
            transform: rotate(-25deg);
            /* Difuminado del borde */
            box-shadow: 0 0 80px 40px #ffffff; 
            
            animation: slideDiagonal 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            z-index: 2;
        }

        @keyframes slideDiagonal {
            0% {
                transform: translate(-5%, -5%) rotate(-25deg);
            }
            100% {
                transform: translate(110%, 110%) rotate(-25deg);
            }
        }

        /* EL DESTELLO FINAL (SHINE) */
        .header-container::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 35%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-25deg);
            animation: shine 1.2s ease-out 2s forwards;
            z-index: 3;
        }

        @keyframes shine {
            100% { left: 200%; }
        }
    </style>
</head>
<body>

<div class="header-container">
    <img src="https://i.postimg.cc/3RB3mzDT/d47e4141-e04b-4c9e-a77b-2c2fd117de53-ezgif-com-jpg-to-webp-converter.webp" class="banner-img">
    <div class="curtain"></div>
</div>

</body>
</html>
