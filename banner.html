<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Limpiamos cualquier margen que pueda desplazar el contenido */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: transparent; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px; /* Espacio para que la sombra no se corte */
        }

        .header-container {
            width: 508px;
            height: 283px;
            position: relative;
            overflow: hidden;
            /* INTEGRACIÓN: Bordes redondeados y sombra sutil */
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            background: #ffffff;
        }

        .banner-img {
            width: 508px;
            height: 283px;
            display: block;
            object-fit: cover;
            border-radius: 15px; /* Forzamos el redondeo en la imagen también */
        }

        /* TELÓN LATERAL CON REVEAL SUAVE */
        .curtain {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%; 
            height: 100%;
            background: linear-gradient(to right, 
                transparent 0%, 
                transparent 20%, 
                white 35%, 
                white 100%);
            
            animation: slideLeftToRight 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            z-index: 2;
        }

        @keyframes slideLeftToRight {
            0% { transform: translateX(-40%); }
            100% { transform: translateX(100%); }
        }

        /* DESTELLO FINAL */
        .header-container::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 30%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: shine 1.2s ease-out 2s forwards;
            z-index: 3;
        }

        @keyframes shine {
            100% { left: 180%; }
        }
    </style>
</head>
<body>

<div class="header-container">
    <img src="https://i.postimg.cc/3RB3mzDT/d47e4141-e04b-4c9e-a77b-2c2fd117de53-ezgif-com-jpg-to-webp-converter.webp" class="banner-img">
    <div class="curtain"></div>
</div>

</body>
</html>
