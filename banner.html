<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background: transparent !important; font-family: 'Segoe UI', Roboto, sans-serif !important; overflow: visible !important; }

        /* Botón fijo: SIEMPRE EXISTE, NUNCA SE MUEVE */
        .pill-fab { 
            position: fixed; bottom: 20px; right: 20px; z-index: 999998;
            display: flex; align-items: center; background: white !important; padding: 6px 20px 6px 6px; 
            border-radius: 40px; cursor: pointer; border: 1px solid #eee !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .pill-fab img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #7a0700 !important; }
        .pill-text { margin-left: 12px; display: flex; flex-direction: column; }
        .pill-text .name { font-size: 14px !important; font-weight: 700 !important; color: #212529 !important; }
        .pill-text .cta { font-size: 10px !important; color: #7a0700 !important; font-weight: 800 !important; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Mensaje: Aparece instantáneo */
        .msg-box {
            display: none; /* Cero animaciones */
            position: fixed; bottom: 80px; right: 20px; z-index: 999999;
            width: 320px; background: white !important; border-radius: 15px !important;
            box-shadow: 0 12px 45px rgba(0,0,0,0.25) !important; border: 1px solid #7a0700 !important;
        }
        .mostrar { display: block !important; }

        /* Cabecera original */
        .msg-header { padding: 14px 18px; background: #f8f9fa !important; border-bottom: 2px solid #7a0700 !important; display: flex; align-items: center; justify-content: space-between; }
        .online-dot { width: 9px; height: 9px; background: #28a745 !important; border-radius: 50%; box-shadow: 0 0 0 2px white; }
        .close-btn { cursor: pointer; font-size: 24px; color: #7a0700 !important; font-weight: bold; }

        /* Ajuste móvil */
        @media (max-width: 480px) {
            .msg-box { top: 20% !important; left: 5% !important; right: 5% !important; width: 90vw !important; bottom: auto !important; }
        }
    </style>
</head>
<body>

    <!-- Botón con TODO el diseño original -->
    <div class="pill-fab" onclick="document.getElementById('msg').classList.add('mostrar')">
        <img src="https://i.postimg.cc/Jz6X1P57/ezgif-4ca1de2224c7e3.webp">
        <div class="pill-text">
            <span class="name">Prof. Inmer C.</span>
            <span class="cta">¡Esto te interesa!</span>
        </div>
    </div>

    <!-- Mensaje con TODO el diseño original -->
    <div class="msg-box" id="msg">
        <div class="msg-header">
            <div style="display: flex; align-items: center;">
                <span class="online-dot"></span>
                <strong style="font-size: 14px; color: #333 !important; margin-left: 10px;">Prof. Inmer Camacaro</strong>
            </div>
            <span class="close-btn" onclick="document.getElementById('msg').classList.remove('mostrar')">×</span>
        </div>
        <div style="padding: 20px; font-size: 15px; color: #333 !important; line-height: 1.6;">
            ¡Hola! Te recuerdo que el cumplimiento del <strong>Dossier de Rol Asignado</strong> es un requisito <strong>indispensable</strong>. Sin esta entrega previa, no podrás participar en el Debate. No lo dejes para último ¡Mucho éxito!
        </div>
    </div>

</body>
</html>
