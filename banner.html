<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            background-color: transparent; 
            overflow: hidden;
        }

        .header-container {
            width: 508px;
            height: 283px;
            position: relative;
            overflow: hidden;
            background: #ffffff;
        }

        .banner-img {
            width: 508px;
            height: 283px;
            display: block;
            object-fit: cover;
        }

        /* TELÓN LATERAL RECTO (NO DIAGONAL) */
        .curtain {
            position: absolute;
            top: 0;
            left: 0;
            width: 150%; 
            height: 100%;
            /* Borde esfumado recto */
            background: linear-gradient(to right, 
                transparent 0%, 
                transparent 10%, 
                white 20%, 
                white 100%);
            
            /* Animación a 2.0s */
            animation: slideLeftToRight 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            z-index: 2;
        }

        @keyframes slideLeftToRight {
            0% {
                /* Empieza tapando todo el ancho de 508px */
                transform: translateX(-20%);
            }
            100% {
                /* Se retira totalmente a la derecha */
                transform: translateX(100%);
            }
        }

        /* Destello final sutil */
        .header-container::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 30%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            /* Entra justo después del telón */
            animation: shine 1.2s ease-out 2s forwards;
            z-index: 3;
        }

        @keyframes shine {
            100% { left: 180%; }
        }
    </style>
</head>
<body>

<div class="header-container">
    <img src="https://i.postimg.cc/3RB3mzDT/d47e4141-e04b-4c9e-a77b-2c2fd117de53-ezgif-com-jpg-to-webp-converter.webp" class="banner-img">
    <div class="curtain"></div>
</div>

</body>
</html>
