<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            background-color: transparent; 
            overflow: hidden;
        }

        .header-container {
            width: 508px;
            height: 283px;
            position: relative;
            overflow: hidden;
            background: white;
        }

        .banner-img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* TELÓN DIAGONAL (PROYECCIÓN) */
        .curtain {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 250%; 
            height: 250%;
            /* El degradado inclinado para el efecto diagonal */
            background: linear-gradient(135deg, 
                transparent 0%, 
                transparent 45%, 
                white 55%, 
                white 100%);
            
            /* Rotación para la diagonal y animación a 2.0s */
            transform: rotate(-15deg);
            animation: slideDiagonal 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            z-index: 2;
        }

        @keyframes slideDiagonal {
            0% {
                transform: translate(-20%, -20%) rotate(-15deg);
            }
            100% {
                transform: translate(60%, 60%) rotate(-15deg);
            }
        }

        /* Destello final sutil */
        .header-container::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 30%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg);
            animation: shine 1.2s ease-out 1.8s forwards;
            z-index: 3;
        }

        @keyframes shine {
            100% { left: 160%; }
        }
    </style>
</head>
<body>

<div class="header-container">
    <img src="https://i.postimg.cc/3RB3mzDT/d47e4141-e04b-4c9e-a77b-2c2fd117de53-ezgif-com-jpg-to-webp-converter.webp" class="banner-img">
    <div class="curtain"></div>
</div>

</body>
</html>
