<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: transparent !important; font-family: sans-serif; overflow: visible !important; }
        .widget-container { position: fixed; bottom: 0; right: 0; z-index: 999999; }
        
        .msg-box { 
            position: fixed; bottom: -1000px; right: 0; /* Lo sacamos de la pantalla al cerrar */
            width: 320px; background: white; border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3); border: 1px solid #7a0700;
        }
        .active .msg-box { bottom: 80px; } /* Al activar, sube a su sitio */
        .active .pill-fab { display: none; }
        
        .pill-fab { 
            position: fixed; bottom: 20px; right: 20px;
            display: flex; align-items: center; background: white; padding: 6px 15px; 
            border-radius: 40px; cursor: pointer; border: 1px solid #7a0700;
        }
    </style>
</head>
<body>
    <div class="widget-container" id="widget">
        <div class="msg-box" id="msg">
            <div style="padding:10px; border-bottom:2px solid #7a0700; display:flex; justify-content:space-between;">
                <strong>Prof. Inmer Camacaro</strong>
                <span onclick="toggle()" style="cursor:pointer; font-weight:bold;">×</span>
            </div>
            <div style="padding:15px; font-size:14px;">¡Hola! El cumplimiento del <strong>Dossier de Rol Asignado</strong> es requisito <strong>indispensable</strong>.</div>
        </div>
        <div class="pill-fab" onclick="toggle()">
            <img src="https://i.postimg.cc/Jz6X1P57/ezgif-4ca1de2224c7e3.webp" style="width:35px; height:35px; border-radius:50%;">
            <div style="margin-left:10px; font-weight:bold; font-size:13px;">Prof. Inmer C.</div>
        </div>
    </div>
    <script>
        function toggle(){
            document.getElementById('widget').classList.toggle('active');
        }
    </script>
</body>
</html>
