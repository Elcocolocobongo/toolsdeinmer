<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; overflow: hidden; display: flex; justify-content: center; }
        
        .container {
            width: 100%;
            max-width: 508px;
            aspect-ratio: 508 / 283;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* TELÓN (Vuelve a lo sencillo para que no descuadre) */
        .curtain {
            position: absolute;
            top: 0; left: 0;
            width: 200%; height: 100%;
            background: linear-gradient(to right, transparent 0%, transparent 15%, white 25%, white 100%);
            animation: slide 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            z-index: 2;
        }

        /* EL BRILLO AHORA ES UNA CAPA LIGERA QUE NO MUEVE NADA */
        .shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-25deg);
            animation: light 1s ease-in-out 1.5s forwards;
            z-index: 3;
        }

        @keyframes slide {
            0% { transform: translateX(-35%); }
            100% { transform: translateX(100%); }
        }

        @keyframes light {
            0% { left: -100%; }
            100% { left: 150%; }
        }

        @media (max-width: 480px) {
            .container { aspect-ratio: 1 / 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.postimg.cc/3RB3mzDT/d47e4141-e04b-4c9e-a77b-2c2fd117de53-ezgif-com-jpg-to-webp-converter.webp">
        <div class="curtain"></div>
        <div class="shine"></div>
    </div>
</body>
</html>
