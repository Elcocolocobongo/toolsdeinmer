<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; overflow: hidden; display: flex; justify-content: center; }
        
        .main-wrapper {
            width: 100%;
            max-width: 508px;
            aspect-ratio: 508 / 283;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        /* LA IMAGEN AHORA TIENE LA ANIMACIÓN DE BRILLO DIRECTA */
        .bg-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            animation: forceFlash 1s ease-in-out 1.5s; /* El brillo ocurre en la imagen */
        }

        /* TELÓN */
        .curtain-wall {
            position: absolute;
            top: 0; left: 0;
            width: 200%; height: 100%;
            background: linear-gradient(to right, transparent 0%, transparent 15%, white 25%, white 100%);
            animation: moveCurtain 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            z-index: 10;
        }

        /* RAYO DE LUZ EXTERNO (CAPA EXTRA) */
        .flash-line {
            position: absolute;
            top: 0;
            left: -150%;
            width: 100px;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 40px 20px rgba(255, 255, 255, 1);
            transform: skewX(-30deg);
            animation: rayo 0.8s ease-in-out 1.5s forwards;
            z-index: 11; /* POR ENCIMA DEL TELÓN */
        }

        @keyframes moveCurtain {
            0% { transform: translateX(-35%); }
            100% { transform: translateX(100%); }
        }

        /* ESTA ANIMACIÓN HACE QUE LA IMAGEN SE ILUMINE SOLA */
        @keyframes forceFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); } /* Explosión de luz */
            100% { filter: brightness(1); }
        }

        @keyframes rayo {
            0% { left: -150%; }
            100% { left: 200%; }
        }

        @media (max-width: 480px) {
            .main-wrapper { aspect-ratio: 1 / 1; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <img src="https://i.postimg.cc/3RB3mzDT/d47e4141-e04b-4c9e-a77b-2c2fd117de53-ezgif-com-jpg-to-webp-converter.webp" class="bg-img">
        <div class="curtain-wall"></div>
        <div class="flash-line"></div>
    </div>
</body>
</html>
