<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: transparent; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* CONTENEDOR BASE (RESPONSIVO CON MAX-WIDTH) */
        .header-container {
            width: 100%;
            max-width: 508px; /* Ancho máximo en PC */
            position: relative;
            overflow: hidden;
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            background: #ffffff;
            
            /* PROPORCIÓN EN PC (Horizontal) */
            aspect-ratio: 508 / 283; 
        }

        /* IMAGEN CON AJUSTE AUTOMÁTICO */
        .banner-img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover; /* Recorta y centra la imagen automáticamente */
            object-position: center; /* Asegura que el centro sea visible */
            border-radius: 15px;
        }

        /* TELÓN LATERAL (RESPONSIVO) */
        .curtain {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%; 
            height: 100%;
            background: linear-gradient(to right, 
                transparent 0%, 
                transparent 20%, 
                white 35%, 
                white 100%);
            
            animation: slideLeftToRight 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            z-index: 2;
        }

        /* DESTELLO FINAL */
        .header-container::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 30%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: shine 1.2s ease-out 2s forwards;
            z-index: 3;
        }

        /* KEYFRAMES UNIFICADOS */
        @keyframes slideLeftToRight {
            0% { transform: translateX(-40%); }
            100% { transform: translateX(100%); }
        }

        @keyframes shine {
            100% { left: 180%; }
        }

        /* =========================================
           MEDIA QUERY PARA TELÉFONOS (MÓVIL)
           Se activa en pantallas de menos de 600px
           ========================================= */
        @media (max-width: 600px) {
            .header-container {
                /* CAMBIAMOS LA PROPORCIÓN A CUADRADA */
                aspect-ratio: 1 / 1; 
                border-radius: 12px; /* Un poco más sutil en móvil */
            }

            .banner-img {
                border-radius: 12px;
                /* object-fit: cover; ya está arriba, recortará al centro */
            }

            /* Suavizamos las animaciones para móvil */
            .curtain {
                animation-duration: 2.2s; 
            }
            .header-container::after {
                animation-duration: 1.5s;
                animation-delay: 2.2s;
            }
        }
    </style>
</head>
<body>

<div class="header-container">
    <img src="https://i.postimg.cc/3RB3mzDT/d47e4141-e04b-4c9e-a77b-2c2fd117de53-ezgif-com-jpg-to-webp-converter.webp" class="banner-img">
    <div class="curtain"></div>
</div>

</body>
</html>
